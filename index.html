<div id="element-game" style="width:100%; max-width:900px; margin:auto; font-family:sans-serif;">

<style>
#element-game * { box-sizing:border-box; user-select:none; }

#element-game .header {
    height:50px;
    background:#333;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 15px;
}

/* ▼ 高さを可変に（iPad対策） */
#element-game .board {
    display:flex;
    flex-direction:column;
    height:70vh;
    max-height:700px;
}

#element-game .area {
    flex:1;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:6px;
    padding:8px;
    position:relative;
}

/* ▼ 上下の区切り */
#element-game #bottom {
    border-top: 3px dashed #ccc;
}

/* ▼ カード（縦長防止） */
#element-game .card {
    perspective:1000px;
    cursor:pointer;
    aspect-ratio: 3 / 2;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

#element-game .inner {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:0.3s;
}

#element-game .flipped .inner { transform:rotateY(180deg); }

#element-game .front,
#element-game .back {
    position:absolute;
    width:100%; height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    backface-visibility:hidden;
    border-radius:8px;
    font-weight:bold;
}

/* ▼ パステルカラー */
#element-game #top .front {
    background:#90CAF9;
    color:#0D47A1;
}

#element-game #bottom .front {
    background:#FFCC80;
    color:#E65100;
}

#element-game .back {
    background:white;
    transform:rotateY(180deg);
}

/* ▼ 裏面文字色 */
#element-game #top .back {
    color:#1565C0;
}

#element-game #bottom .back {
    color:#E65100;
}

#element-game .matched {
    opacity:0;
    transform:scale(0);
    transition:0.3s;
}

#element-game .modal {
    display:none;
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

#element-game .modal-content {
    background:white;
    padding:20px;
    border-radius:10px;
    width:90%;
}

#element-game button {
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
}
</style>

<div class="header">
<div>元素めくり</div>
<div>
タイム: <span id="t">0</span>秒　
ミス: <span id="m">0</span>
</div>
</div>

<div class="board">
<div class="area" id="top"></div>
<div class="area" id="bottom"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="mt"></h3>
<div id="txt"></div>
<button id="btn">次へ</button>
</div>
</div>

<script>
(function(){

const data=[
{n:'水素',s:'H',note:'宇宙で一番軽い元素。'},
{n:'ヘリウム',s:'He',note:'風船に使われる。'},
{n:'リチウム',s:'Li',note:'電池に使われる。'},
{n:'ベリリウム',s:'Be',note:'X線装置に使われる。'},
{n:'ホウ素',s:'B',note:'ガラスを強くする。'},
{n:'炭素',s:'C',note:'ダイヤモンドの材料。'},
{n:'窒素',s:'N',note:'空気の78%。'},
{n:'酸素',s:'O',note:'呼吸に必要。'},
{n:'フッ素',s:'F',note:'歯を守る。'},
{n:'ネオン',s:'Ne',note:'ネオンサイン。'},
{n:'ナトリウム',s:'Na',note:'塩になる。'},
{n:'マグネシウム',s:'Mg',note:'強く光る。'},
{n:'アルミニウム',s:'Al',note:'軽い金属。'},
{n:'ケイ素',s:'Si',note:'半導体材料。'},
{n:'リン',s:'P',note:'マッチに使う。'},
{n:'硫黄',s:'S',note:'温泉のにおい。'},
{n:'塩素',s:'Cl',note:'水の消毒。'},
{n:'アルゴン',s:'Ar',note:'電球に入る。'},
{n:'カリウム',s:'K',note:'体に必要。'},
{n:'カルシウム',s:'Ca',note:'骨を作る。'},
{n:'鉄',s:'Fe',note:'最も使われる金属。'},
{n:'銅',s:'Cu',note:'10円玉。電気を通す。'},
{n:'銀',s:'Ag',note:'アクセサリー。'},
{n:'亜鉛',s:'Zn',note:'サビ止め。'}
];

let topSel=null, botSel=null, lock=false, modalOpen=false;
let miss=0, match=0, start=null, timer;

const top=document.querySelector('#element-game #top');
const bottom=document.querySelector('#element-game #bottom');
const modal=document.querySelector('#element-game #modal');
const mt=document.querySelector('#element-game #mt');
const txt=document.querySelector('#element-game #txt');
const btn=document.querySelector('#element-game #btn');

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function card(d,type){
let c=document.createElement('div');
c.className='card';

let i=document.createElement('div');
i.className='inner';

let f=document.createElement('div');
f.className='front';
f.textContent='?';

let b=document.createElement('div');
b.className='back';
b.textContent = type==='n'?d.n:d.s;

i.appendChild(f);
i.appendChild(b);
c.appendChild(i);

c.onclick=()=>{
if(lock||modalOpen) return;

if(!start){
start=Date.now();
timer=setInterval(()=>{
document.getElementById('t').textContent =
Math.floor((Date.now()-start)/1000);
},250);
}

c.classList.add('flipped');

if(type==='n'){
if(topSel) topSel.c.classList.remove('flipped');
topSel={c,d};
}else{
if(botSel) botSel.c.classList.remove('flipped');
botSel={c,d};
}

if(topSel && botSel){
lock=true;

setTimeout(()=>{
if(topSel.d.s===botSel.d.s){

show(
'正解！',
`<b>${topSel.d.s} は、${topSel.d.n}だね。</b><br><br>${topSel.d.note}`,
()=>{
topSel.c.classList.add('matched');
botSel.c.classList.add('matched');
match++;
reset();
if(match===10) end();
});

}else{

miss++;
document.getElementById('m').textContent=miss;

show(
'ちがうよ',
`<b>${botSel.d.s} は、${botSel.d.n}だよ。</b><br><br>${botSel.d.note}`,
()=>{
topSel.c.classList.remove('flipped');
botSel.c.classList.remove('flipped');
reset();
});
}
},500);
}
};

return c;
}

function reset(){ topSel=null; botSel=null; lock=false; }

function show(t,body,cb){
modalOpen=true;
mt.textContent=t;
txt.innerHTML=body;
modal.style.display='flex';

btn.onclick=()=>{
modal.style.display='none';
modalOpen=false;
cb();
};
}

function end(){
clearInterval(timer);
show('クリア！','よくできました！',init);
}

function init(){
topSel=null; botSel=null;
match=0; miss=0;
document.getElementById('m').textContent=0;
document.getElementById('t').textContent=0;
start=null;

let selected = shuffle([...data]).slice(0,10);

top.innerHTML='';
bottom.innerHTML='';

shuffle([...selected]).forEach(d=>top.appendChild(card(d,'n')));
shuffle([...selected]).forEach(d=>bottom.appendChild(card(d,'s')));
}

init();

})();
</script>

</div>
